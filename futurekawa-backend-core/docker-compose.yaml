services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: futurekawa-postgres
    environment:
      POSTGRES_DB: futurekawa_core
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa-network

  # Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: futurekawa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - futurekawa-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serveur SMTP de test (capture les mails sans vrai compte) - UI sur http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: futurekawa-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - futurekawa-network

  # MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: futurekawa-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - futurekawa-network
    depends_on:
      - postgres

  # MQTT Service (Mosquitto to RabbitMQ Bridge)
  mqtt-service:
    build:
      context: ..
      dockerfile: futurekawa-mqtt-service/Dockerfile
    container_name: futurekawa-mqtt-service
    environment:
      MQTT_BROKER: tcp://mosquitto:1883
      MQTT_CLIENT_ID: futurekawa-mqtt-service
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - futurekawa-network
    restart: unless-stopped

  # Backend Core Spring Boot Application
  backend:
    build:
      context: ..
      dockerfile: futurekawa-backend-core/Dockerfile
    container_name: futurekawa-backend-core
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/futurekawa_core
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secret}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      MQTT_BROKER: tcp://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET:-futurekawa-secret-key-for-jwt-token-generation-and-validation-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      ALERT_RECIPIENT: ${ALERT_RECIPIENT:-alerts@futurekawa.local}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mosquitto:
        condition: service_started
      mqtt-service:
        condition: service_started
    networks:
      - futurekawa-network
    restart: unless-stopped

  # Alerting Service (consomme les alertes -> envoie les mails)
  alerting-service:
    build:
      context: ..
      dockerfile: futurekawa-alerting-service/Dockerfile
    container_name: futurekawa-alerting-service
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # Valeurs épinglées sur MailHog : la stack de test reste auto-suffisante
      # et identique sur toutes les machines (indépendante de l'env du shell hôte).
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_SMTP_AUTH: "false"
      MAIL_SMTP_STARTTLS: "false"
      MAIL_FROM: no-reply@futurekawa.local
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - futurekawa-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

networks:
  futurekawa-network:
    driver: bridge
