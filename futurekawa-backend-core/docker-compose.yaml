version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: futurekawa-postgres
    environment:
      POSTGRES_DB: futurekawa_core
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futurekawa-network

  # MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: futurekawa-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - futurekawa-network
    depends_on:
      - postgres

  # Backend Core Spring Boot Application
  backend:
    build:
      context: ..
      dockerfile: futurekawa-backend-core/Dockerfile
    container_name: futurekawa-backend-core
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/futurekawa_core
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secret}
      MQTT_BROKER: tcp://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET:-futurekawa-secret-key-for-jwt-token-generation-and-validation-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - futurekawa-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mosquitto_data:
    driver: local
  mosquitto_logs:
    driver: local

networks:
  futurekawa-network:
    driver: bridge
