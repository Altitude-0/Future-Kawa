# Mosquitto MQTT Broker Configuration

# Listener on port 1883 (default MQTT)
listener 1883
protocol mqtt

# Listener on port 9001 (WebSocket)
listener 9001
protocol websockets

# Allow anonymous connections (for testing)
allow_anonymous true

# Message persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# Max connections
max_connections -1

# Default QoS
max_queued_messages 1000
