spring:
  application:
    name: futurekawa-alerting-service

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

futurekawa:
  mail:
    from: ${MAIL_FROM:no-reply@futurekawa.local}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

logging:
  level:
    com.futurekawa: DEBUG
