name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: futurekawa-product

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: mvn clean test

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPOSITORY_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -f futurekawa-backend-core/Dockerfile .

      - name: Push Docker image
        run: docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
