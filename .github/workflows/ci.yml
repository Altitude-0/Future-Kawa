name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: futurekawa-product

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: mvn clean test

  deploy-maven:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: Deploy to GitHub Packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Deploy to GitHub Packages
        run: mvn clean deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: Build & Push Docker Images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        run: echo "REPOSITORY_OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and push Backend Core image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -f futurekawa-backend-core/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push MQTT Service image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-mqtt-service:latest \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-mqtt-service:${{ github.sha }} \
            -f futurekawa-mqtt-service/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-mqtt-service:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-mqtt-service:${{ github.sha }}

      - name: Build and push Alerting Service image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-alerting-service:latest \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-alerting-service:${{ github.sha }} \
            -f futurekawa-alerting-service/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-alerting-service:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-alerting-service:${{ github.sha }}

      - name: Build and push Extranet Service image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-extranet-service:latest \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-extranet-service:${{ github.sha }} \
            -f futurekawa-extranet-service/Dockerfile futurekawa-extranet-service/
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-extranet-service:latest
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER_LOWER }}/futurekawa-extranet-service:${{ github.sha }}

  notify-discord:
    needs: [build-and-test, deploy-maven, build-and-push]
    runs-on: ubuntu-latest
    name: Notify Discord
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    steps:
      - name: Send Discord notification
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "✅ FutureKawa Pipeline Succeeded!",
              "embeds": [{
                "title": "Build & Deploy Success",
                "description": "Commit: `${{ github.sha }}`\nBranch: `${{ github.ref }}`",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Repository",
                    "value": "${{ github.repository }}",
                    "inline": true
                  },
                  {
                    "name": "Actor",
                    "value": "${{ github.actor }}",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "GitHub Actions"
                },
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }'
